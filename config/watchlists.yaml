# EU equities. yfinance tickers; IBKR contract resolution confirms exchange.
# Sector breakdown:
#   Tech        : ASML.AS SAP.DE
#   Semiconductors: IFX.DE
#   Luxury/Cons : MC.PA RMS.PA AIR.PA BMW.DE OR.PA
#   Staples     : NESN.SW
#   Industrials : SIE.DE
#   Defence     : RHM.DE
#   Energy      : TTE.PA
#   Healthcare  : NOVN.SW BAYN.DE
#   Financials  : BNP.PA ALV.DE
# NOTE: NESN.SW and NOVN.SW trade in CHF on SIX Swiss — prices treated as EUR
#       (~5% FX error, acceptable at this portfolio size). Fix in Phase 1b.
stocks_eu:
  - ASML.AS        # ASML, Amsterdam
  - SAP.DE         # SAP, Xetra
  - IFX.DE         # Infineon Technologies, Xetra — semi, bot7+bot10
  - MC.PA          # LVMH, Paris
  - RMS.PA         # Hermès International, Paris — pristine uptrend, bot10
  - OR.PA          # L'Oréal, Paris — secular consumer uptrend, bot10
  - NESN.SW        # Nestle, SIX Swiss (CHF)
  - SIE.DE         # Siemens, Xetra
  - AIR.PA         # Airbus, Paris
  - TTE.PA         # TotalEnergies, Paris
  - NOVN.SW        # Novartis, SIX Swiss (CHF)
  - BNP.PA         # BNP Paribas, Paris
  - BMW.DE         # BMW, Xetra
  - ALV.DE         # Allianz, Xetra
  - BAYN.DE        # Bayer, Xetra
  - RHM.DE         # Rheinmetall, Xetra — defence theme, bot10 only (caution: theme risk)

# Crypto ETPs — resolved via IBKR contract details in Phase 3.
crypto_etps:
  - BTCE.DE        # WisdomTree Physical Bitcoin
  - ZETH.DE        # 21Shares Ethereum Staking ETP

