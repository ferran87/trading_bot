# UCITS-compliant universe, EUR-denominated where possible.
# All Xetra tickers use the .DE suffix (yfinance convention). IBKR symbols
# may differ — verify each against IBKR contract search before first live run.
#
# Mapping rationale (US original -> UCITS Xetra equivalent):
#   SPY  -> SXR8.DE   iShares Core S&P 500 UCITS
#   QQQ  -> SXRV.DE   iShares Nasdaq 100 UCITS
#   IWM  -> ZPRR.DE   SPDR Russell 2000 UCITS
#   EZU  -> EXSA.DE   iShares Euro Stoxx 600 UCITS  (broad European equities)
#   EWJ  -> ISJP.DE   iShares MSCI Japan Small Cap UCITS  (Japan exposure)
#   -    -> XDWD.DE   Xtrackers MSCI World UCITS  (broad world, replaces DIA)
#   XLK  -> QDVE.DE   iShares S&P 500 IT Sector UCITS
#   XLF  -> QDVH.DE   iShares S&P 500 Financials Sector UCITS  (confirmed via IBKR)
#
# NOTE: SXR1.DE removed — it was mislabelled as Japan but is MSCI Pacific ex-Japan.
# IS3N.DE (EM) removed — IBKR paper returns no contract; no clean EM UCITS found on IBKR.
# CEUG.DE/EEM equivalents excluded — IBKR paper: no EUR share class found.
# DIA/XLE/XLY/XLV have no UCITS equivalents with verified IBKR contracts; omitted.

# High-beta US growth stocks for aggressive momentum rotation (Bot 1).
# NVDA, META, AMZN, GOOGL already have venue entries below.
stocks_aggressive:
  - NVDA
  - META
  - AMZN
  - TSLA
  - AMD
  - PLTR
  - GOOGL

etfs_ucits:
  - SXR8.DE    # iShares Core S&P 500 UCITS
  - SXRV.DE   # iShares Nasdaq 100 UCITS
  - ZPRR.DE   # SPDR Russell 2000 UCITS
  - EXSA.DE   # iShares Euro Stoxx 600 UCITS  (broad European equities)
  - XDWD.DE   # Xtrackers MSCI World UCITS
  - QDVE.DE   # iShares S&P 500 IT Sector UCITS
  - QDVH.DE   # iShares S&P 500 Financials Sector UCITS

# US equities — accessible to EU retail (stocks, not ETFs; PRIIPs doesn't apply).
