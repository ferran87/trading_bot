# Curated watchlist for the AI Thesis Bot (bot 30).
#
# Claude evaluates these tickers every Sunday and builds/updates investment
# theses for them.  New tickers require explicit user approval before being
# added here — Claude cannot modify this file autonomously.
#
# Sector tags are used for the 40% sector-concentration cap.
# Theme tags are informational (not enforced in code) but help Claude
# group and reason about the portfolio.
# Tickers must be valid yfinance symbols.

