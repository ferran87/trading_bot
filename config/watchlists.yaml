  - JPM
  - V
  - BAC
  - GS
  - UNH
  - JNJ
  - PFE
  - LLY       # Eli Lilly — GLP-1 structural trend, bot10
  - XOM
  - CVX
  - CAT
  - HON
  - PG
  - KO
  - WMT
  - COST      # Costco Wholesale — cleanest large-cap uptrend, bot10
  - HD
  - NKE
  - DIS
  - BKNG      # Booking Holdings — high beta + clean trend, bot7+bot10
  - UBER      # Uber Technologies — high beta, profitable since 2023, bot7
